name: bachelor_foods
description: Bachelor Foods — Your favorite meals, delivered fast.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^6.2.1

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # Internationalization & date/number formatting
  intl: ^0.19.0

  # Local storage (coins system)
  shared_preferences: ^2.3.2

  # ✅ Razorpay Payment Gateway
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/